<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MSI Sprint Analytics — trivago</title>
<style>
:root{
  --trv-red:#E32851;--trv-blue:#0088D9;--trv-orange:#FF932C;
  --trv-pink:#FF9DDE;--trv-lightblue:#78DAFF;--trv-yellow:#FFCC31;
  --trv-black:#000000;--trv-white:#FFFFFF;--trv-warm-white:#F8F8F6;
  --trv-gray-100:#F7F7F7;--trv-gray-200:#F0F0F0;--trv-gray-300:#E0E0E0;
  --trv-gray-500:#808080;--trv-gray-700:#515151;--trv-gray-900:#1A1A1A;
  --font:'Arial','Helvetica Neue',Helvetica,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--trv-warm-white);color:var(--trv-gray-900);min-height:100vh;display:flex;flex-direction:column}

.header{background:var(--trv-white);border-bottom:3px solid var(--trv-blue);padding:14px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-weight:700;font-size:24px;letter-spacing:-.5px}
.logo .r1{color:var(--trv-red)}.logo .o1{color:var(--trv-orange)}.logo .b1{color:var(--trv-blue)}
.header h1{font-size:17px;font-weight:700;color:var(--trv-gray-900);flex:1}
.trv-os-tag{display:inline-block;background:var(--trv-lightblue);color:var(--trv-black);font-size:10px;padding:4px 12px;border-radius:4px;font-weight:500}
.last-updated{font-size:11px;color:var(--trv-gray-500)}

.filters-bar{background:var(--trv-white);padding:10px 32px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--trv-gray-300)}
.fg{display:flex;align-items:center;gap:6px}
.fg label{font-size:11px;font-weight:700;color:var(--trv-gray-700);text-transform:uppercase;letter-spacing:.5px}
.fg select{padding:5px 10px;border:1px solid var(--trv-gray-300);border-radius:6px;font-size:12px;font-family:var(--font);background:var(--trv-white)}
.fg select:focus{outline:2px solid var(--trv-blue)}
.team-chips{display:flex;gap:5px}
.tc{padding:5px 12px;border-radius:18px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid var(--trv-gray-300);background:var(--trv-white);color:var(--trv-gray-700);transition:all .15s}
.tc.active{color:var(--trv-white);border-color:transparent}
.tc[data-team="all"].active{background:var(--trv-blue)}
.tc[data-team="MSI_BRAND_CIM"].active{background:var(--trv-red)}
.tc[data-team="MSI_EXP"].active{background:var(--trv-orange)}
.tc[data-team="MSI_OPS"].active{background:var(--trv-blue)}
.apply-btn{padding:6px 20px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:var(--trv-blue);color:var(--trv-white);font-family:var(--font);transition:all .15s}
.apply-btn:hover{background:var(--trv-red)}
.apply-btn.flash{background:var(--trv-red);transform:scale(1.05)}

.tabs{background:var(--trv-white);padding:0 32px;display:flex;gap:0;border-bottom:2px solid var(--trv-gray-200);overflow-x:auto}
.tab{padding:10px 18px;font-size:12px;font-weight:600;color:var(--trv-gray-500);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;font-family:var(--font)}
.tab:hover{color:var(--trv-gray-900);background:var(--trv-gray-100)}
.tab.active{color:var(--trv-blue);border-bottom-color:var(--trv-blue)}
.tab.has-alert{position:relative}
.tab.has-alert::after{content:'';position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--trv-red);border-radius:50%}

.main{flex:1;padding:20px 32px;max-width:1400px;width:100%;margin:0 auto}
.tc-content{display:none}.tc-content.active{display:block}
.stitle{font-size:15px;font-weight:700;color:var(--trv-gray-900);margin:20px 0 10px}
.stitle:first-child{margin-top:0}

.kpi-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.kpi{flex:1;min-width:120px;background:var(--trv-gray-100);border-radius:10px;padding:14px 12px;text-align:center;border-top:4px solid var(--trv-blue)}
.kpi-l{font-size:9px;color:var(--trv-gray-500);text-transform:uppercase;letter-spacing:.5px}
.kpi-v{font-size:24px;font-weight:700;color:var(--trv-gray-900);margin-top:3px}
.kpi-d{font-size:11px;margin-top:2px}

.scards{display:grid;gap:10px;margin-bottom:16px}
.scard{background:var(--trv-gray-100);border-radius:10px;padding:14px;border-top:4px solid var(--trv-blue)}
.scard .nm{font-size:12px;font-weight:700;color:var(--trv-gray-700);margin-bottom:8px;text-align:center}
.scard .rw{display:flex;justify-content:space-between;margin-bottom:4px}
.scard .lb{font-size:10px;color:var(--trv-gray-500)}
.scard .vl{font-size:13px;font-weight:700}
.pbar{background:var(--trv-gray-300);border-radius:6px;height:16px;overflow:hidden;position:relative;margin-top:6px}
.pfill{height:100%;border-radius:6px;transition:width .4s}
.ptxt{position:absolute;top:0;left:0;right:0;text-align:center;font-size:10px;font-weight:700;color:var(--trv-gray-900);line-height:16px}

.bar-row{display:flex;align-items:center;margin-bottom:3px;position:relative}
.bar-label{width:140px;font-size:11px;color:var(--trv-gray-700);text-align:right;padding-right:10px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:22px;background:var(--trv-gray-100);border-radius:4px;overflow:visible;position:relative}
.bar-fill{height:100%;border-radius:4px;position:relative;min-width:1px;transition:width .3s}
.bar-val{position:absolute;right:-40px;top:0;font-size:11px;font-weight:600;color:var(--trv-gray-700);line-height:22px;width:38px}

/* Per-person stacked progress bar: completed (blue) + in-progress (orange) + remaining (gray) */
.pp-row{display:flex;align-items:center;margin-bottom:6px;gap:10px}
.pp-label{width:160px;font-size:12px;color:var(--trv-gray-900);font-weight:600;text-align:right;padding-right:8px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pp-track{flex:1;max-width:560px;height:22px;background:var(--trv-gray-200);border-radius:4px;overflow:hidden;display:flex;position:relative;cursor:default}
.pp-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;transition:width .3s;min-width:0;overflow:hidden;white-space:nowrap}
.pp-seg-done{background:var(--trv-blue)}
.pp-seg-prog{background:var(--trv-orange)}
.pp-seg-rest{background:var(--trv-gray-300);color:var(--trv-gray-700)}
.pp-stats{font-size:11px;color:var(--trv-gray-700);font-weight:600;flex-shrink:0;width:140px}
.pp-stats b{color:var(--trv-gray-900);font-weight:700}
.pp-pct{display:inline-block;min-width:38px;text-align:right;color:var(--trv-blue);font-weight:700}

.legend{display:flex;gap:14px;margin:8px 0;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--trv-gray-700)}
.legend-sq{width:12px;height:12px;border-radius:3px}

.dtable{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.dtable th{background:var(--trv-blue);color:var(--trv-white);padding:7px 8px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.3px}
.dtable td{padding:6px 8px;border-bottom:1px solid var(--trv-gray-200)}
.dtable tr:hover{background:var(--trv-gray-100)}
.dtable tr:nth-child(even){background:var(--trv-gray-100)}
.dtable tr.jrow{cursor:pointer;transition:background .12s}
.dtable tr.jrow:hover{background:#E8F4FD}
.dtable tr.jrow:hover td:first-child{color:var(--trv-blue);font-weight:600;text-decoration:underline}
.alert-card.jrow{cursor:pointer}
.alert-card.jrow:hover{background:#E8F4FD;border-color:var(--trv-blue)}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

.exp{border:1px solid var(--trv-gray-300);border-radius:8px;margin:6px 0;overflow:hidden}
.exp-h{padding:10px 12px;cursor:pointer;font-weight:600;font-size:12px;display:flex;justify-content:space-between;align-items:center;background:var(--trv-gray-100)}
.exp-h:hover{background:var(--trv-gray-200)}
.exp-b{display:none;padding:10px 12px;border-top:1px solid var(--trv-gray-200)}
.exp.open .exp-b{display:block}
.exp-arr{transition:transform .2s;font-size:10px}.exp.open .exp-arr{transform:rotate(90deg)}

.init-card{background:var(--trv-gray-100);border-radius:10px;padding:14px;margin-bottom:10px;border-left:4px solid var(--trv-gray-300)}
.init-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;cursor:pointer}
.init-title{font-size:13px;font-weight:700;color:var(--trv-gray-900);flex:1}
.init-pct{font-size:18px;font-weight:700;margin-left:12px}
.init-meta{font-size:10px;color:var(--trv-gray-500);margin-bottom:6px}
.init-milestones{display:none;margin-top:8px;border-top:1px solid var(--trv-gray-300);padding-top:8px}
.init-card.open .init-milestones{display:block}

/* AI Summary block (expandable) */
.init-ai{display:none;margin-top:8px;background:#fff;border:1px solid var(--trv-gray-300);border-left:3px solid var(--trv-blue);border-radius:6px;padding:12px}
.init-card.open .init-ai{display:block}
.init-ai-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--trv-gray-200)}
.init-ai-tag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--trv-blue)}
.init-ai-tag::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--trv-blue)}
.init-ai-headline{font-size:12px;font-weight:600;color:var(--trv-gray-900);flex:1;text-align:left}
.init-ai-meta{font-size:9px;color:var(--trv-gray-500);font-style:italic;flex-shrink:0}
.init-ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.init-ai-section{background:var(--trv-gray-100);border-radius:5px;padding:8px 10px}
.init-ai-section.done{background:#E8F5EE;border-left:2px solid #008513}
.init-ai-section.planned{background:#E8F4FD;border-left:2px solid var(--trv-blue)}
.init-ai-section.overdue{background:#FCE8EC;border-left:2px solid var(--trv-red)}
.init-ai-section.blockers{background:#FFF4E6;border-left:2px solid var(--trv-orange)}
.init-ai-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.init-ai-section.done .init-ai-h{color:#008513}
.init-ai-section.planned .init-ai-h{color:var(--trv-blue)}
.init-ai-section.overdue .init-ai-h{color:var(--trv-red)}
.init-ai-section.blockers .init-ai-h{color:var(--trv-orange)}
.init-ai-list{margin:0;padding-left:14px;font-size:11px;color:var(--trv-gray-900);line-height:1.45}
.init-ai-list li{margin-bottom:3px}
.init-ai-empty{font-size:11px;color:var(--trv-gray-500);font-style:italic}
@media (max-width:720px){.init-ai-grid{grid-template-columns:1fr}}
.ms-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px}
.ms-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ms-name{flex:1;color:var(--trv-gray-700)}
.ms-bar{width:120px;height:10px;background:var(--trv-gray-300);border-radius:5px;overflow:hidden;flex-shrink:0}
.ms-bar-fill{height:100%;border-radius:5px}
.ms-pct{width:36px;text-align:right;font-weight:600;color:var(--trv-gray-700)}
.ms-weight{width:40px;text-align:right;color:var(--trv-gray-500);font-size:10px}
.ms-warn{color:var(--trv-orange);font-size:14px;cursor:help;flex-shrink:0;position:relative}
.low-sp{color:var(--trv-orange);font-size:13px;cursor:help;margin-left:4px;position:relative}
.high-sp{color:var(--trv-red);font-size:13px;cursor:help;margin-left:4px;position:relative}

.alert-card{background:var(--trv-white);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;border-left:4px solid var(--trv-orange)}
.alert-card.overdue{border-left-color:var(--trv-red)}
.alert-icon{font-size:18px;flex-shrink:0}
.alert-body{flex:1}
.alert-title{font-size:12px;font-weight:700;color:var(--trv-gray-900)}
.alert-meta{font-size:10px;color:var(--trv-gray-500);margin-top:2px}
.alert-badge{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;flex-shrink:0}
.alert-badge.overdue{background:var(--trv-red);color:var(--trv-white)}
.alert-badge.soon{background:var(--trv-orange);color:var(--trv-white)}
.alert-badge.today{background:var(--trv-yellow);color:var(--trv-black)}
.alert-count{display:inline-flex;align-items:center;justify-content:center;background:var(--trv-red);color:var(--trv-white);border-radius:10px;font-size:10px;font-weight:700;min-width:18px;height:18px;padding:0 5px;margin-left:4px}

.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}

.pie-wrap{display:flex;align-items:center;gap:20px;margin:12px 0;flex-wrap:wrap}
.pie{width:200px;height:200px;border-radius:50%;position:relative}
.pie-hole{position:absolute;top:25%;left:25%;width:50%;height:50%;background:var(--trv-white);border-radius:50%}
.pie-legend{font-size:12px;line-height:2}
.pie-legend-item{display:flex;align-items:center;gap:6px}
.pie-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

.footer{background:var(--trv-white);border-top:1px solid var(--trv-gray-300);padding:10px 32px;display:flex;justify-content:space-between;align-items:center}
.footer-left{font-size:11px;color:var(--trv-gray-500)}
.empty{text-align:center;padding:40px;color:var(--trv-gray-500);font-size:13px}
</style>
</head>

<script>
const C={RED:'#E32851',BLUE:'#0088D9',ORANGE:'#FF932C',PINK:'#FF9DDE',LB:'#78DAFF',YELLOW:'#FFCC31',
  G100:'#F7F7F7',G200:'#F0F0F0',G300:'#E0E0E0',G500:'#808080',G700:'#515151',G900:'#1A1A1A',W:'#FFF',
  SERIES:['#E32851','#FF932C','#0088D9','#FF9DDE','#78DAFF','#FFCC31']};
const TC={MSI_OPS:C.BLUE,MSI_EXP:C.ORANGE,MSI_BRAND_CIM:C.RED};
const TD={MSI_BRAND_CIM:'Brand & CIM',MSI_EXP:'Experimentation',MSI_OPS:'Operations',Unknown:'Unassigned'};
const COMPLETED_SET=new Set(['Feedback','Done','Submitted','Awaiting Feedback']);
const IN_PROGRESS_SET=new Set(['In Progress']);
const NOT_SPRINT=new Set(['Backlog','Completed','Completed: Not Part of Sprint']);

let DATA=null,F={sprint:'active',team:'all',assignee:'all'};
let SPRINT_TEAMS={};
let INIT_SUMMARIES={},INIT_SUMMARIES_META={};

/* ── Helpers ─────────────────────────────────────────────────────── */
function buildSprintTeams(){
  SPRINT_TEAMS={};
  (DATA.snapshots||[]).forEach(s=>{
    if(s.sprint_name==='Board Snapshot') return;
    const teams=new Set();
    (s.issues||[]).forEach(i=>{if(i.team&&i.team!=='Unknown') teams.add(i.team)});
    SPRINT_TEAMS[s.sprint_name]=[...teams];
  });
}

function relevantSprints(){
  const all=DATA.snapshots.filter(s=>s.sprint_name!=='Board Snapshot');
  const teamMatch=s=>F.team==='all'||(SPRINT_TEAMS[s.sprint_name]||[]).includes(F.team);
  const byTeam=all.filter(teamMatch);
  if(F.sprint==='active'){
    return byTeam.filter(s=>s.sprint_state==='active');
  }
  if(F.sprint&&F.sprint!=='all'){
    const exact=byTeam.filter(s=>s.sprint_name===F.sprint);
    return exact.length?exact:byTeam.filter(s=>s.sprint_name===F.sprint);
  }
  return byTeam;
}

/* Smart default sprint:
   team='all'  -> 'active' sentinel = all currently active sprints
                  aggregated. Falls back to most recently started sprint
                  if there are no active ones (off-cycle weeks).
   team=X      -> 'active' sentinel if X has any active sprint; else
                  the most recently started closed sprint for that team. */
function defaultSprintFor(team){
  const all=DATA.snapshots.filter(s=>s.sprint_name!=='Board Snapshot');
  const matchesTeam=s=>team==='all'||(SPRINT_TEAMS[s.sprint_name]||[]).includes(team);
  const startKey=s=>s.sprint_start||'0000-00-00';
  const eligible=all.filter(matchesTeam);
  if(!eligible.length) return 'all';
  const active=eligible.filter(s=>s.sprint_state==='active');
  if(active.length) return 'active';
  return eligible.sort((a,b)=>startKey(b).localeCompare(startKey(a)))[0].sprint_name;
}

function snap(n){return DATA.snapshots.find(s=>s.sprint_name===n)}
function z(v){return Math.max(0,v||0)}
function sp(v){return z(v).toFixed(1)}
function pct(v){return Math.round((v||0)*100)+'%'}
function rc(r){return r>=.8?C.BLUE:r>=.5?C.ORANGE:C.RED}

function issues(sn,team,assignee){
  const s=snap(sn);if(!s)return [];
  let list=s.issues||[];
  if(team&&team!=='all') list=list.filter(i=>i.team===team);
  if(assignee&&assignee!=='all') list=list.filter(i=>i.assignee===assignee);
  return list;
}

function metrics3(issueList){
  const inSprint=issueList.filter(i=>!NOT_SPRINT.has(i.status));
  const committed_sp=inSprint.reduce((s,i)=>s+(i.story_points||0),0);
  const inprog=inSprint.filter(i=>IN_PROGRESS_SET.has(i.status));
  const inprog_sp=inprog.reduce((s,i)=>s+(i.story_points||0),0);
  const done=inSprint.filter(i=>COMPLETED_SET.has(i.status));
  const done_sp=done.reduce((s,i)=>s+(i.story_points||0),0);
  const ratio=committed_sp?done_sp/committed_sp:0;
  return{committed_sp,inprog_sp,completed_sp:done_sp,
    committed_count:inSprint.length,inprog_count:inprog.length,completed_count:done.length,
    ratio:Math.round(ratio*1000)/1000,carry_over_sp:z(committed_sp-done_sp)};
}

function sprintMetrics(sn,team){return metrics3(issues(sn,team,null))}

function catMetrics(sn,team){
  const iss=issues(sn,team,null).filter(i=>!NOT_SPRINT.has(i.status));
  const committed=iss.reduce((s,i)=>s+(i.story_points||0),0);
  const bau=iss.filter(i=>i.category==='bau').reduce((s,i)=>s+(i.story_points||0),0);
  const adhoc=iss.filter(i=>i.category==='adhoc').reduce((s,i)=>s+(i.story_points||0),0);
  const completed=iss.filter(i=>COMPLETED_SET.has(i.status)).reduce((s,i)=>s+(i.story_points||0),0);
  return{committed,bau,adhoc,completed};
}

function combinedMetrics(team){
  const sps=relevantSprints();
  let tc=0,ti=0,td=0;
  const per=[];
  for(const s of sps){
    const m=sprintMetrics(s.sprint_name,team);
    if(m.committed_sp===0&&m.completed_sp===0) continue;
    tc+=m.committed_sp;ti+=m.inprog_sp;td+=m.completed_sp;
    per.push({name:s.sprint_name,...m});
  }
  const r=tc?Math.round(td/tc*1000)/1000:0;
  return{committed_sp:tc,inprog_sp:ti,completed_sp:td,ratio:r,carry_over_sp:z(tc-td),per};
}

function allAssignees(){
  const s=new Set();
  DATA.snapshots.forEach(sn=>(sn.issues||[]).forEach(i=>{if(i.assignee&&i.assignee!=='Unassigned')s.add(i.assignee)}));
  return[...s].sort();
}

function statusBadge(status){
  let bg=C.G300,fg=C.G900;
  if(COMPLETED_SET.has(status)){bg=C.LB;fg=C.G900}
  else if(IN_PROGRESS_SET.has(status)){bg=C.ORANGE;fg=C.W}
  else{bg=C.BLUE;fg=C.W}
  return `<span class="status-badge" style="background:${bg};color:${fg}">${status}</span>`;
}

/* ── Chart builders ──────────────────────────────────────────────── */
function hbar(items,maxVal){
  if(!items.length) return '';
  if(!maxVal) maxVal=Math.max(...items.map(i=>i.value),1);
  return items.map(i=>{
    const w=Math.min((i.value/maxVal)*100,100);
    return `<div class="bar-row"><div class="bar-label" title="${i.label}">${i.labelHtml||i.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${i.color||C.BLUE}" data-tooltip="${i.tooltip||i.label+': '+i.value.toFixed(1)+' SP'}"></div>
      <div class="bar-val">${i.value.toFixed(1)}</div></div></div>`;
  }).join('');
}

function vbars(items,maxVal){
  if(!items.length) return '';
  if(!maxVal) maxVal=Math.max(...items.map(i=>Math.max(...i.bars.map(b=>b.value))),1);
  const bw=Math.max(20,Math.min(60,400/items.length));
  let html=`<div style="display:flex;align-items:flex-end;gap:${items.length>4?8:16}px;height:260px;padding:0 10px;border-bottom:1px solid ${C.G300}">`;
  items.forEach(item=>{
    html+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end">`;
    html+=`<div style="display:flex;gap:3px;align-items:flex-end;height:calc(100% - 24px)">`;
    item.bars.forEach(b=>{
      const h=maxVal?Math.max((b.value/maxVal)*100,1):1;
      html+=`<div style="width:${bw}px;height:${h}%;background:${b.color};border-radius:3px 3px 0 0;position:relative;cursor:default" data-tooltip="${b.tooltip||b.name+': '+b.value.toFixed(1)+' SP'}">
        <span style="position:absolute;top:-16px;left:0;right:0;text-align:center;font-size:9px;font-weight:600;color:${C.G700}">${b.value>0?b.value.toFixed(1):''}</span></div>`;
    });
    html+=`</div><div style="font-size:10px;color:${C.G700};text-align:center;margin-top:4px;max-width:${bw*3}px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${item.label}">${item.label}</div></div>`;
  });
  return html+'</div>';
}

function pie(slices){
  const total=slices.reduce((s,sl)=>s+sl.value,0);
  if(!total) return '';
  let deg=0;
  const stops=slices.map(sl=>{const start=deg;deg+=(sl.value/total)*360;return `${sl.color} ${start}deg ${deg}deg`}).join(',');
  let html=`<div class="pie-wrap"><div class="pie" style="background:conic-gradient(${stops})"><div class="pie-hole"></div></div>`;
  html+='<div class="pie-legend">';
  slices.forEach(sl=>{html+=`<div class="pie-legend-item"><div class="pie-dot" style="background:${sl.color}"></div>${sl.label}: ${sl.value} (${Math.round(sl.value/total*100)}%)</div>`});
  return html+'</div></div>';
}

function legend(items){return '<div class="legend">'+items.map(i=>`<div class="legend-item"><div class="legend-sq" style="background:${i.color}"></div>${i.label}</div>`).join('')+'</div>'}
function kpi(label,value,color){return `<div class="kpi" style="border-top-color:${color}"><div class="kpi-l">${label}</div><div class="kpi-v">${value}</div></div>`}
function kpiD(label,value,delta,color){return `<div class="kpi" style="border-top-color:${color}"><div class="kpi-l">${label}</div><div class="kpi-v">${value}</div><div class="kpi-d" style="color:${color}">${delta}</div></div>`}
function st(t){return `<div class="stitle">${t}</div>`}
const JIRA_BROWSE='https://trivago.atlassian.net/browse/';
function table(cols,rows,keyCol){
  if(!rows.length) return '';
  let h='<table class="dtable"><thead><tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>';
  rows.forEach(r=>{
    if(typeof keyCol==='number' && r[keyCol]){
      const k=String(r[keyCol]).replace(/<[^>]+>/g,'').trim();
      h+=`<tr class="jrow" data-jkey="${k}" title="Open ${k} in Jira">`+r.map(v=>`<td>${v}</td>`).join('')+'</tr>';
    } else {
      h+='<tr>'+r.map(v=>`<td>${v}</td>`).join('')+'</tr>';
    }
  });
  return h+'</tbody></table>';
}
function bindJiraRows(){
  document.querySelectorAll('tr.jrow[data-jkey],.alert-card.jrow[data-jkey]').forEach(el=>{
    if(el._jBound) return;
    el._jBound=true;
    el.addEventListener('click',e=>{
      if(e.target.closest('a')) return;
      const k=el.getAttribute('data-jkey');
      if(k) window.open(JIRA_BROWSE+k,'_blank','noopener');
    });
  });
}

function vbarTooltips(){
  document.querySelectorAll('[data-tooltip]').forEach(el=>{
    if(el._ttBound) return;
    el._ttBound=true;
    el.addEventListener('mouseenter',function(){
      const tip=document.createElement('div');tip.className='_tt';
      tip.textContent=this.getAttribute('data-tooltip');
      tip.style.cssText=`position:fixed;z-index:9999;background:${C.G900};color:${C.W};padding:5px 12px;border-radius:4px;font-size:11px;white-space:nowrap;pointer-events:none`;
      document.body.appendChild(tip);
      const r=this.getBoundingClientRect();
      tip.style.left=Math.max(4,r.left+r.width/2-tip.offsetWidth/2)+'px';
      tip.style.top=(r.top-tip.offsetHeight-6)+'px';
      this._tip=tip;
    });
    el.addEventListener('mouseleave',function(){if(this._tip){this._tip.remove();this._tip=null}});
  });
}

function updateSprintDropdown(opts){
  const sel=document.getElementById('f-sprint');
  const prevVal=sel.value||'active';
  const activeChip=document.querySelector('.tc.active');
  const teamFilter=activeChip?activeChip.dataset.team:'all';
  const available=DATA.snapshots.filter(s=>{
    if(s.sprint_name==='Board Snapshot') return false;
    if(teamFilter==='all') return true;
    return (SPRINT_TEAMS[s.sprint_name]||[]).includes(teamFilter);
  });
  const startKey=s=>s.sprint_start||'0000-00-00';
  const active=available.filter(s=>s.sprint_state==='active')
    .sort((a,b)=>startKey(b).localeCompare(startKey(a)));
  const closed=available.filter(s=>s.sprint_state!=='active')
    .sort((a,b)=>startKey(b).localeCompare(startKey(a)));
  const def=defaultSprintFor(teamFilter);
  let html='';
  if(active.length){
    const isDef=def==='active';
    html+=`<option value="active">All Active Sprints${isDef?' (latest)':''}</option>`;
  }
  html+='<option value="all">All Sprints (incl. closed)</option>';
  if(active.length){
    html+='<option disabled>\u2500\u2500 Active \u2500\u2500</option>';
    html+=active.map(s=>{
      const isDef=s.sprint_name===def;
      return `<option value="${s.sprint_name}">${s.sprint_name} \u2022 active${isDef?' (latest)':''}</option>`;
    }).join('');
  }
  if(closed.length){
    html+='<option disabled>\u2500\u2500 Closed \u2500\u2500</option>';
    html+=closed.map(s=>{
      const isDef=s.sprint_name===def;
      return `<option value="${s.sprint_name}">${s.sprint_name} \u2022 closed${isDef?' (latest)':''}</option>`;
    }).join('');
  }
  sel.innerHTML=html;
  const wantDefault=opts&&opts.forceDefault;
  let pick=def;
  if(!wantDefault&&[...sel.options].some(o=>o.value===prevVal)) pick=prevVal;
  sel.value=[...sel.options].some(o=>o.value===pick)?pick:(active.length?'active':'all');
  F.sprint=sel.value;
}

  });

      <div class="rw"><span class="lb">Completed</span><span class="vl" style="color:${C.ORANGE}">${sp(comb.completed_sp)} SP</span></div>
      <div class="rw"><span class="lb">Completion</span><span class="vl" style="color:${rc(comb.ratio)}">${pct(comb.ratio)}</span></div></div>`;
  }

    return{label:s.name,bars:[
      {name:'Committed',value:cm.committed,color:C.BLUE,tooltip:'Committed: '+cm.committed.toFixed(1)+' SP'},
      {name:'BAU',value:cm.bau,color:C.ORANGE,tooltip:'BAU: '+cm.bau.toFixed(1)+' SP ('+pf(cm.bau)+')'},
      {name:'Adhoc',value:cm.adhoc,color:C.PINK,tooltip:'Adhoc: '+cm.adhoc.toFixed(1)+' SP ('+pf(cm.adhoc)+')'},
      {name:'Completed',value:cm.completed,color:C.LB,tooltip:'Completed: '+cm.completed.toFixed(1)+' SP ('+pf(cm.completed)+')'}]};
  });
  if(showTotal){
    let tC=0,tB=0,tA=0,tD=0;
    ps.forEach(s=>{const cm=catMetrics(s.name,tm);tC+=cm.committed;tB+=cm.bau;tA+=cm.adhoc;tD+=cm.completed});
    const pf=v=>tC?Math.round(v/tC*100)+'% of Committed':'0%';
    barItems.push({label:'TOTAL',bars:[
      {name:'Committed',value:tC,color:C.BLUE,tooltip:'Committed: '+tC.toFixed(1)+' SP'},

  h+=vbars(barItems,maxV);

/* ── TAB 3: Per Person ───────────────────────────────────────────── */
function rPerson(){
  const el=document.getElementById('tab-person');
  const tm=F.team==='all'?null:F.team;
  const asgn=F.assignee==='all'?null:F.assignee;
  const sps=relevantSprints();
  const personData={};
  sps.forEach(s=>{
    issues(s.sprint_name,tm,asgn).filter(i=>!NOT_SPRINT.has(i.status)).forEach(i=>{
      const a=i.assignee||'Unassigned';
      if(!personData[a]) personData[a]={};
      if(!personData[a][s.sprint_name]) personData[a][s.sprint_name]={committed:0,inprog:0,completed:0};
      personData[a][s.sprint_name].committed+=(i.story_points||0);
      if(IN_PROGRESS_SET.has(i.status)) personData[a][s.sprint_name].inprog+=(i.story_points||0);
      if(COMPLETED_SET.has(i.status)) personData[a][s.sprint_name].completed+=(i.story_points||0);
    });
  });
  const persons=Object.entries(personData).sort((a,b)=>{
    const ta=Object.values(a[1]).reduce((s,v)=>s+v.committed,0);
    const tb=Object.values(b[1]).reduce((s,v)=>s+v.committed,0);
    return tb-ta;
  });
  if(!persons.length){el.innerHTML='<div class="empty">No data for selected filters.</div>';return}

  let h=st('Committed vs Done by Person');
  const spNames=sps.map(s=>s.sprint_name);
  const maxV=Math.max(...persons.map(([_,d])=>Object.values(d).reduce((s,v)=>s+v.committed,0)),1);

  h+=persons.map(([name,d])=>{
    const total=Object.values(d).reduce((s,v)=>s+v.committed,0);
    const comp=Object.values(d).reduce((s,v)=>s+v.completed,0);
    const inprog=Object.values(d).reduce((s,v)=>s+v.inprog,0);
    const rest=Math.max(0,total-comp-inprog);
    const spDetail=spNames.filter(sn=>d[sn]).map(sn=>`${sn}: ${d[sn].committed.toFixed(1)}`).join(' | ');
    const lowSpSprints=spNames.filter(sn=>d[sn]&&d[sn].committed>0&&d[sn].committed<5);
    const highSpSprints=spNames.filter(sn=>d[sn]&&d[sn].committed>10);
    let labelHtml=name;
    if(lowSpSprints.length){
      const tip=lowSpSprints.map(sn=>`Too few SP: ${d[sn].committed.toFixed(1)} in ${sn}`).join(', ');
      labelHtml+=` <span class="low-sp" data-tooltip="${tip}">⚠</span>`;
    }
    if(highSpSprints.length){
      const tip=highSpSprints.map(sn=>`Way too many SP: ${d[sn].committed.toFixed(1)} in ${sn}`).join(', ');
      labelHtml+=` <span class="high-sp" data-tooltip="${tip}">⚠</span>`;
    }
    const trackWidthPct=total?Math.max(15,(total/maxV)*100):0;
    const segPct=v=>total?(v/total)*100:0;
    const pctDone=total?Math.round(comp/total*100):0;
    const tip=`${name}: ${comp.toFixed(1)} done / ${inprog.toFixed(1)} in progress / ${rest.toFixed(1)} not started of ${total.toFixed(1)} SP total | ${spDetail}`;
    return `<div class="pp-row">
      <div class="pp-label" title="${name}">${labelHtml}</div>
      <div class="pp-track" data-tooltip="${tip}" style="width:${trackWidthPct}%">
        ${comp>0?`<div class="pp-seg pp-seg-done" style="width:${segPct(comp)}%">${segPct(comp)>12?comp.toFixed(1):''}</div>`:''}
        ${inprog>0?`<div class="pp-seg pp-seg-prog" style="width:${segPct(inprog)}%">${segPct(inprog)>12?inprog.toFixed(1):''}</div>`:''}
        ${rest>0?`<div class="pp-seg pp-seg-rest" style="width:${segPct(rest)}%">${segPct(rest)>12?rest.toFixed(1):''}</div>`:''}
      </div>
      <div class="pp-stats"><b>${comp.toFixed(1)}</b> / ${total.toFixed(1)} SP <span class="pp-pct">${pctDone}%</span></div>
    </div>`;
  }).join('');
  h+=legend([{label:'Completed',color:C.BLUE},{label:'In Progress',color:C.ORANGE},{label:'Not Started',color:C.G300}]);

  h+=st('Person Summary');
  h+=table(['Assignee','Total SP','Completed SP','Completion %'],
    persons.map(([name,d])=>{
      const tot=Object.values(d).reduce((s,v)=>s+v.committed,0);
      const comp=Object.values(d).reduce((s,v)=>s+v.completed,0);
      return[name,sp(tot),sp(comp),tot?pct(comp/tot):'0%'];
    }));
  el.innerHTML=h;
}

/* ── TAB 4: Team Breakdown ───────────────────────────────────────── */
function rTeam(){
  const el=document.getElementById('tab-team');
  const tm=F.team==='all'?null:F.team;
  const asgn=F.assignee==='all'?null:F.assignee;
  const sps=relevantSprints();
  const allTeams=tm?[tm]:['MSI_BRAND_CIM','MSI_EXP','MSI_OPS'];

  const teamAgg={};
  allTeams.forEach(t=>{teamAgg[t]={committed:0,inprog:0,completed:0,issues:[]}});
  sps.forEach(s=>{
    (s.issues||[]).forEach(i=>{
      if(!teamAgg[i.team]||NOT_SPRINT.has(i.status))return;
      if(asgn&&i.assignee!==asgn)return;
      teamAgg[i.team].committed+=(i.story_points||0);
      if(IN_PROGRESS_SET.has(i.status)) teamAgg[i.team].inprog+=(i.story_points||0);
      if(COMPLETED_SET.has(i.status)) teamAgg[i.team].completed+=(i.story_points||0);
      teamAgg[i.team].issues.push(i);
    });
  });

  const visibleTeams=allTeams.filter(t=>teamAgg[t].committed>0||teamAgg[t].issues.length>0);
  if(!visibleTeams.length){el.innerHTML='<div class="empty">No team data for the selected filters.</div>';return}

  let h=st('Team Comparison');
  h+=`<div class="scards" style="grid-template-columns:repeat(${visibleTeams.length},1fr)">`;
  visibleTeams.forEach(t=>{
    const a=teamAgg[t];const r=a.committed?a.completed/a.committed:0;const col=TC[t]||C.G300;
    h+=`<div class="scard" style="border-top-color:${col}"><div class="nm">${TD[t]||t}</div>
      <div class="rw"><span class="lb">Committed</span><span class="vl">${sp(a.committed)} SP</span></div>
      <div class="rw"><span class="lb">In Progress</span><span class="vl" style="color:${C.ORANGE}">${sp(a.inprog)} SP</span></div>
      <div class="rw"><span class="lb">Completed</span><span class="vl" style="color:${col}">${sp(a.completed)} SP</span></div>
      <div class="pbar"><div class="pfill" style="width:${Math.min(r*100,100)}%;background:${rc(r)}"></div><div class="ptxt">${pct(r)}</div></div></div>`;
  });
  h+='</div>';

  h+=st('Committed vs Completed by Team');
  const mx=Math.max(...visibleTeams.map(t=>teamAgg[t].committed),1);
  h+=vbars(visibleTeams.map(t=>({label:TD[t]||t,bars:[
    {name:'Committed',value:teamAgg[t].committed,color:C.BLUE},
    {name:'In Progress',value:teamAgg[t].inprog,color:C.ORANGE},
    {name:'Completed',value:teamAgg[t].completed,color:C.LB}]})),mx);
  h+=legend([{label:'Committed',color:C.BLUE},{label:'In Progress',color:C.ORANGE},{label:'Completed',color:C.LB}]);

  h+=st('Assignee Breakdown by Team');
  const aTeam={};
  visibleTeams.forEach(t=>{teamAgg[t].issues.forEach(i=>{const a=i.assignee||'Unassigned';if(!aTeam[a])aTeam[a]={};aTeam[a][t]=(aTeam[a][t]||0)+(i.story_points||0)})});
  const sortedA=Object.entries(aTeam).sort((a,b)=>Object.values(b[1]).reduce((s,v)=>s+v,0)-Object.values(a[1]).reduce((s,v)=>s+v,0));
  if(sortedA.length){
    const amx=Math.max(...sortedA.map(([_,d])=>Object.values(d).reduce((s,v)=>s+v,0)),1);
    h+=hbar(sortedA.map(([name,d])=>{
      const total=Object.values(d).reduce((s,v)=>s+v,0);
      const detail=visibleTeams.filter(t=>d[t]).map(t=>`${TD[t]}: ${d[t].toFixed(1)}`).join(' | ');
      const mainTeam=visibleTeams.reduce((best,t)=>(d[t]||0)>(d[best]||0)?t:best,visibleTeams[0]);
      return{label:name,value:total,color:TC[mainTeam]||C.G300,tooltip:`${name}: ${total.toFixed(1)} SP | ${detail}`};
    }),amx);
  }
  el.innerHTML=h;
}

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function aiSummaryBlock(epicKey){
  const s=INIT_SUMMARIES[epicKey];
  if(!s) return '';
  const meta=INIT_SUMMARIES_META.generated_at?` · as of ${INIT_SUMMARIES_META.generated_at}`:'';
  const sec=(cls,title,items)=>{
    if(!items||!items.length) return `<div class="init-ai-section ${cls}"><div class="init-ai-h">${title}</div><div class="init-ai-empty">None.</div></div>`;
    return `<div class="init-ai-section ${cls}"><div class="init-ai-h">${title}</div><ul class="init-ai-list">${items.map(i=>`<li>${escapeHtml(i)}</li>`).join('')}</ul></div>`;
  };
  return `<div class="init-ai" onclick="event.stopPropagation()">
    <div class="init-ai-header">
      <span class="init-ai-tag">AI Summary</span>
      <span class="init-ai-headline">${escapeHtml(s.headline||'')}</span>
      <span class="init-ai-meta">Robin${meta}</span>
    </div>
    <div class="init-ai-grid">
      ${sec('done','What\u2019s done',s.done)}
      ${sec('planned','What\u2019s planned',s.planned)}
      ${sec('overdue','Overdue',s.overdue)}
      ${sec('blockers','Critical blockers',s.blockers)}
    </div>
  </div>`;
}

function rInit(){
  const el=document.getElementById('tab-initiative');
  const tm=F.team==='all'?null:F.team;
  let epics=DATA.epics||[];
  if(tm) epics=epics.filter(e=>e.team===tm);
  if(!epics.length){el.innerHTML='<div class="empty">No initiative data for this selection.</div>';return}

  epics=[...epics].sort((a,b)=>b.progress-a.progress);
  let h=st('Overall Initiative Completion');

  epics.forEach(e=>{
    const p=e.progress||0;
    const col=TC[e.team]||C.G300;
    const ms=e.milestones||[];
    const doneMs=ms.filter(m=>m.milestone_progress>=1).length;

    h+=`<div class="init-card" style="border-left-color:${col}" onclick="this.classList.toggle('open')">
      <div class="init-header">
        <div class="init-title">${e.epic_key}: ${e.summary}</div>
        <div class="init-pct" style="color:${rc(p)}">${pct(p)}</div>
      </div>
      <div class="init-meta">${TD[e.team]||e.team} · ${doneMs}/${ms.length} milestones complete</div>
      <div class="pbar" style="height:12px"><div class="pfill" style="width:${Math.min(p*100,100)}%;background:${rc(p)}"></div><div class="ptxt" style="line-height:12px;font-size:9px">${pct(p)}</div></div>
      ${aiSummaryBlock(e.epic_key)}
      <div class="init-milestones">`;

    ms.forEach(m=>{
      const mp=m.milestone_progress||0;
      const noSubs=!m.total_subtasks||m.total_subtasks===0;
      const doneNoSubs=noSubs&&mp>=1;
      const sc=mp>=1?'#008513':mp>0?C.ORANGE:C.G500;
      h+=`<div class="ms-row">
        <div class="ms-status" style="background:${sc}"></div>
        <div class="ms-name" title="${m.summary}">${m.key}: ${(m.summary||'').slice(0,40)}</div>`;
      if(noSubs&&!doneNoSubs) h+=`<span class="ms-warn" data-tooltip="Yet to create subtask">⚠</span>`;
      if(doneNoSubs) h+=`<span class="ms-warn" style="color:#008513" data-tooltip="Milestone done (no subtasks)">✓</span>`;
      h+=`<div class="ms-bar"><div class="ms-bar-fill" style="width:${Math.min(mp*100,100)}%;background:${sc}"></div></div>
        <div class="ms-pct">${pct(mp)}</div>
        <div class="ms-weight">${m.weight!=null?Math.round(m.weight*100)+'%':'—'}</div>
      </div>`;
    });
    h+='</div></div>';
  });

  h+=legend(Object.entries(TC).map(([k,v])=>({label:TD[k]||k,color:v})));
  el.innerHTML=h;
}

/* ── TAB 6: Completion ───────────────────────────────────────────── */
function rCompletion(){
  const el=document.getElementById('tab-completion');
  const tm=F.team==='all'?null:F.team;
  const asgn=F.assignee==='all'?null:F.assignee;
  const sps=relevantSprints();

  const spData=sps.map(s=>({name:s.sprint_name,...sprintMetrics(s.sprint_name,tm)})).filter(s=>s.committed_sp>0||s.completed_sp>0);
  if(!spData.length){el.innerHTML='<div class="empty">No completion data for the selected filters.</div>';return}

  let h=st('Sprint Completion Overview');
  h+=`<div class="scards" style="grid-template-columns:repeat(${spData.length},1fr)">`;
  spData.forEach((s,i)=>{
    const col=C.SERIES[i%6];
    h+=`<div class="scard" style="border-top-color:${col}"><div class="nm">${s.name}</div>
      <div class="rw"><span class="lb">Committed</span><span class="vl">${sp(s.committed_sp)} SP</span></div>
      <div class="rw"><span class="lb">In Progress</span><span class="vl" style="color:${C.ORANGE}">${sp(s.inprog_sp)} SP</span></div>
      <div class="rw"><span class="lb">Completed</span><span class="vl" style="color:${col}">${sp(s.completed_sp)} SP</span></div>
      <div class="pbar"><div class="pfill" style="width:${Math.min(s.ratio*100,100)}%;background:${rc(s.ratio)}"></div><div class="ptxt">${pct(s.ratio)}</div></div></div>`;
  });
  h+='</div>';

  const comb=combinedMetrics(tm);
  h+='<div class="kpi-row">';
  h+=kpi('Total Committed',sp(comb.committed_sp)+' SP',C.BLUE);
  h+=kpi('Total In Progress',sp(comb.inprog_sp)+' SP',C.ORANGE);
  h+=kpi('Total Completed',sp(comb.completed_sp)+' SP',C.LB);
  h+=kpi('Overall Completion',pct(comb.ratio),rc(comb.ratio));
  h+='</div>';

  h+=st('Ticket Details This Sprint');
  const relSprints=sps.filter(s=>spData.some(d=>d.name===s.sprint_name));
  relSprints.forEach(s=>{
    const allIss=issues(s.sprint_name,tm,asgn).filter(i=>!NOT_SPRINT.has(i.status));
    if(!allIss.length) return;
    const committed=allIss.filter(i=>!IN_PROGRESS_SET.has(i.status)&&!COMPLETED_SET.has(i.status));
    const inprog=allIss.filter(i=>IN_PROGRESS_SET.has(i.status));
    const completed=allIss.filter(i=>COMPLETED_SET.has(i.status));
    h+=`<div class="exp" onclick="this.classList.toggle('open')">
      <div class="exp-h"><span><strong>${s.sprint_name}</strong> — ${allIss.length} tickets (${committed.length} committed, ${inprog.length} in progress, ${completed.length} completed)</span><span class="exp-arr">▶</span></div>
      <div class="exp-b">`;
    h+=table(['Key','Summary','Assignee','Status','SP','Team'],
      allIss.sort((a,b)=>{
        const order=i=>COMPLETED_SET.has(i.status)?2:IN_PROGRESS_SET.has(i.status)?1:0;
        return order(a)-order(b);
      }).map(i=>[i.key,(i.summary||'').slice(0,50),i.assignee||'—',statusBadge(i.status),sp(i.story_points),TD[i.team]||i.team]),0);
    h+='</div></div>';
  });
  el.innerHTML=h;
}

/* ── TAB 7: Alerts ───────────────────────────────────────────────── */
function getAlerts(){
  const now=new Date();
  const h48=new Date(now.getTime()+48*60*60*1000);
  const tm=F.team==='all'?null:F.team;
  const relNames=new Set(relevantSprints().map(s=>s.sprint_name));
  relNames.add('Board Snapshot');
  const alerts=[];
  DATA.snapshots.forEach(sn=>{
    if(!relNames.has(sn.sprint_name)) return;
    (sn.issues||[]).forEach(i=>{
      if(i.issue_type!=='Sub-task'||!i.due_date) return;
      if(COMPLETED_SET.has(i.status)) return;
      if(tm&&i.team!==tm) return;
      const due=new Date(i.due_date+'T23:59:59');
      if(due<=h48){
        const daysLeft=Math.ceil((due-now)/(1000*60*60*24));
        let urgency='soon';
        if(daysLeft<0) urgency='overdue';
        else if(daysLeft===0) urgency='today';
        alerts.push({...i,due,daysLeft,urgency,sprint:sn.sprint_name});
      }
    });
  });
  const seen=new Set();
  return alerts.filter(a=>{if(seen.has(a.key))return false;seen.add(a.key);return true}).sort((a,b)=>a.daysLeft-b.daysLeft);
}

function rAlerts(){
  const el=document.getElementById('tab-alerts');
  const alerts=getAlerts();
  let h=st('Upcoming & Overdue Sub-Tasks (Next 48 Hours)');
  if(!alerts.length){h+='<div class="empty">No sub-tasks due in the next 48 hours. All clear!</div>';el.innerHTML=h;return}

  const overdue=alerts.filter(a=>a.urgency==='overdue');
  const today=alerts.filter(a=>a.urgency==='today');
  const soon=alerts.filter(a=>a.urgency==='soon');

  h+='<div class="kpi-row">';
  h+=kpi('Overdue',overdue.length,C.RED);
  h+=kpi('Due Today',today.length,C.YELLOW);
  h+=kpi('Due in 48h',soon.length,C.ORANGE);
  h+=kpi('Total Alerts',alerts.length,C.BLUE);
  h+='</div>';

  const renderGroup=(title,icon,list)=>{
    if(!list.length) return '';
    let g=st(title);
    list.forEach(a=>{
      g+=`<div class="alert-card jrow ${a.urgency==='overdue'?'overdue':''}" data-jkey="${a.key}" title="Open ${a.key} in Jira"><div class="alert-icon">${icon}</div>
        <div class="alert-body"><div class="alert-title">${a.key}: ${(a.summary||'').slice(0,60)}</div>
        <div class="alert-meta">${a.assignee||'Unassigned'} · ${a.sprint} · ${TD[a.team]||a.team} · Due: ${a.due_date}</div></div>
        <span class="alert-badge ${a.urgency}">${a.urgency==='overdue'?Math.abs(a.daysLeft)+'d overdue':a.urgency==='today'?'Today':'In '+a.daysLeft+'d'}</span></div>`;
    });
    return g;
  };
  h+=renderGroup('Overdue','⚠',overdue);
  h+=renderGroup('Due Today','⏰',today);
  h+=renderGroup('Due Within 48 Hours','📋',soon);
  el.innerHTML=h;
}

function updateAlertBadge(){
  const alerts=getAlerts();
  const btn=document.getElementById('tab-alerts-btn');
  if(alerts.length){
    btn.classList.add('has-alert');
    btn.innerHTML=`Alerts <span class="alert-count">${alerts.length}</span>`;
  }else{
    btn.classList.remove('has-alert');
    btn.innerHTML='Alerts';
  }
}

/* ── Init ─────────────────────────────────────────────────────────── */
async function init(){
  try{DATA=await fetch('data/sprints.json?v='+Date.now()).then(r=>r.json())}
  catch(e){document.querySelector('.main').innerHTML='<div class="empty">Could not load sprints.json.</div>';return}
  try{
    const s=await fetch('data/initiative_summaries.json?v='+Date.now()).then(r=>r.json());
    INIT_SUMMARIES=s.summaries||{};
    INIT_SUMMARIES_META={generated_at:s.generated_at,generated_by:s.generated_by};
  }catch(e){INIT_SUMMARIES={};INIT_SUMMARIES_META={}}
  buildSprintTeams();
  populateFilters();
  updateAlertBadge();
  renderActive();
}
init();
</script>

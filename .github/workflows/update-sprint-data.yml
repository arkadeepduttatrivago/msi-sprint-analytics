name: Update Sprint Data & Deploy

on:
  schedule:
    # Every day at 07:00 UTC (09:00 CET)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      jql_override:
        description: 'Override JQL query (leave empty for default)'
        required: false
        type: string
  push:
    branches: [main]
    paths: [data/sprints.json, index.html]

env:
  JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
  JIRA_CLOUD_ID: ${{ secrets.JIRA_CLOUD_ID }}
  REGISTRY: cr.internal.prod.europe-dus1.tools.trv.cloud
  IMAGE_NAME: msi-sprint-analytics

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Jira data
        run: python scripts/fetch_jira.py
        env:
          JQL_OVERRIDE: ${{ github.event.inputs.jql_override || '' }}

      - name: Build sprint data
        run: python scripts/build_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sprints.json
          if git diff --cached --quiet; then
            echo "No changes to sprints.json"
          else
            git commit -m "chore: update sprint data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

  deploy-pages:
    runs-on: ubuntu-latest
    needs: [fetch-and-update]
    if: always() && !failure() && !cancelled()
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull origin main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-internal:
    runs-on: ubuntu-latest
    needs: [fetch-and-update]
    if: always() && !failure() && !cancelled()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull origin main

      - name: Log in to trivago registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.TRV_REGISTRY_USERNAME }}
          password: ${{ secrets.TRV_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          TAG=$(date -u +%Y%m%d-%H%M)
          docker build -f Dockerfile.nginx -t $REGISTRY/$IMAGE_NAME:$TAG -t $REGISTRY/$IMAGE_NAME:latest .
          docker push $REGISTRY/$IMAGE_NAME:$TAG
          docker push $REGISTRY/$IMAGE_NAME:latest

name: Update Sprint Data & Deploy

on:
  schedule:
    # Monday 10:00 UTC (12:00 CET) — pre-close snapshot of Sprint X
    - cron: "0 10 * * 1"
    # Tuesday 07:00 UTC (09:00 CET) — post-open snapshot of Sprint X+1
    - cron: "0 7 * * 2"
  workflow_dispatch:
    inputs:
      jql_override:
        description: "Override JQL query (leave empty for default)"
        required: false
        type: string
  push:
    branches: [ main ]
    paths: [ data/sprints.json, index.html ]

env:
  JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
  JIRA_CLOUD_ID: ${{ secrets.JIRA_CLOUD_ID }}

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Jira data
        run: python scripts/fetch_jira.py
        env:
          JQL_OVERRIDE: ${{ github.event.inputs.jql_override || '' }}

      - name: Build sprint data
        run: python scripts/build_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sprints.json
          if git diff --cached --quiet; then
            echo "No changes to sprints.json"
          else
            git commit -m "chore: update sprint data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

  deploy-pages:
    runs-on: ubuntu-latest
    needs: [ fetch-and-update ]
    if: always() && !failure() && !cancelled()
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull origin main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
